name: Build release artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:        # also allow manual runs from the Actions tab

permissions:
  contents: write           # needed to attach files to the GitHub release

jobs:
  build-linux:
    name: Linux (AppImage + tarball)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # so `git describe --tags` works

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxcb-cursor0 libxkbcommon-x11-0 libegl1 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 libxcb-xkb1 \
            libxcb-sync1 libxcb-util1 libdbus-1-3 libfuse2 \
            fonts-dejavu-core
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          sudo mv appimagetool-x86_64.AppImage /usr/local/bin/appimagetool

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Build
        run: bash scripts/build_linux.sh

      - uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            TranslateApp-*-x86_64.AppImage
            TranslateApp-*-linux-x86_64.tar.gz

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TranslateApp-*-x86_64.AppImage
            TranslateApp-*-linux-x86_64.tar.gz

  build-windows:
    name: Windows (ZIP + Inno Setup)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Build
        shell: powershell
        run: .\scripts\build_windows.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            TranslateApp-*-windows-x64.zip
            Output/TranslateApp-*-setup.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TranslateApp-*-windows-x64.zip
            Output/TranslateApp-*-setup.exe
